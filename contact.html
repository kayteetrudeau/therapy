    <script>
      function openMobileMenu() {
        document.getElementById('mobileMenu').classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      function closeMobileMenu() {
        document.getElementById('mobileMenu').classList.remove('open');
        document.body.style.overflow = '';
      }
      function toggleSection(id) {
        const section = document.getElementById(id);
        const chevron = document.getElementById(id + '-chevron');
        const isOpen = section.style.display === 'flex';
        section.style.display = isOpen ? 'none' : 'flex';
        chevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
      }
    </script>

  </head>
  <body class="bg-white font-body selection:bg-tertiary/30">
    <div id="header-placeholder"></div>
<script>
  fetch('header.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('header-placeholder').innerHTML = data;
    });
</script>
   <main class="pt-24 pb-12 px-4">
      <div class="max-w-3xl mx-auto">
        <h1
          class="text-4xl md:text-5xl font-headline italic text-center mb-4"
        >
          Get in Touch
        </h1>
        <p class="text-center font-body text-gray-600 mb-12">
          Have a question or want to suggest a resource? I'd love to hear from
          you.
        </p>

        <div
          class="bg-white p-8 md:p-12 rounded-[3rem] shadow-xl border relative overflow-hidden"
          style="border-color:rgb(243 231 253 / 25);">
          <div
class="absolute -top-24 -right-24 w-48 h-48 bg-[#f7be4e]/20 rounded-full blur-3xl"          ></div>

          <form
            action="https://formspree.io/f/mrejjzek"
            method="POST"
            class="space-y-6 relative z-10"
          >
            <div>
              <label
                class="block font-headline mb-2 px-2"
                for="full-name"
                >Name</label
              >
              <input
                type="text"
                name="name"
                id="full-name"
                placeholder="Your name"
                required
                class="w-full px-6 py-4 rounded-full border-2  outline-none transition-all font-body"  />
            </div>

            <div>
              <label
                class="block font-headline mb-2 px-2"
                for="email"
                >Email</label
              >
              <input
                type="email"
                name="email"
                id="email"
                placeholder="hello@example.com"
                required
                class="w-full px-6 py-4 rounded-full border-2  outline-none transition-all font-body bg-[#f3e7fd]/30"
              />
            </div>

            <div>
              <label
                class="block font-headline text-[#3b0764] mb-2 px-2"
                for="message"
                >Message</label
              >
              <textarea
                name="message"
                id="message"
                rows="5"
                placeholder="What's on your mind?"
                required
                class="w-full px-6 py-6 rounded-[2rem] border-2 outline-none transition-all font-body"
              ></textarea>
            </div>

            <input type="text" name="_gotcha" style="display: none" />

            <div class="pt-4">
              <button
                type="submit"
                class="w-full send btn-gradient py-4 rounded-full text-white text-xl transition-transform active:scale-95 shadow-lg"
              >
                Send Message ✦
              </button>
            </div>
          </form>
        </div>

        <div class="mt-12 text-center space-y-2">
          <p class="font-body text-sm text-gray-500">
            Or email me directly at:
          </p>
          <span
            class="font-bold transition-colors"
          style="color: #eb4677">
            hello [at] kayteetrudeau.ca
          </span>
        </div>
      </div>
    </main>

    <footer>
      <div
        class="footer-wave mt-4 relative pt-20 overflow-hidden"
      >
        <div
          style="
            position: absolute;
            top: -2px;
            left: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
          "
        >
          <svg
            viewBox="0 0 1440 80"
            preserveAspectRatio="none"
            xmlns="http://www.w3.org/2000/svg"
            style="display: block; width: 100%"
          >
            <path
              d="M0,40 C180,0 360,80 540,40 C720,0 900,80 1080,40 C1260,0 1350,60 1440,40 L1440,0 L0,0 Z"
              fill="#ffffff"
            />
          </svg>
        </div>
        <div
          class="font-label text-center text-xs p-4"
          style="color: rgb(59 7 100 / 0.95)"
        ><div style="margin-bottom: 5px">
          <span>All are welcome here</span
          ><img
            src="https://cdn.shopify.com/s/files/1/0006/9556/6392/files/Inclusive-Pride-Flag.png?format=100webp&width=50"
            alt="Inclusive Pride Flag"
            style="display: inline-block; height: 12px; margin: 0 4px"
          />
        </div>
          ©2026 Kaytee Trudeau, Registered Psychotherapist (Qualifying) #20562.
          All Rights Reserved.
        </div>
      </div>
    </footer>
